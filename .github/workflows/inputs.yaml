name: Parameterized Deploy Workflow
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Choose the environment to deploy
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - testing
          - production
      artifact_tag:
        description: Choose the git tag to deploy
        required: true
jobs:
  input-parameter:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the App
        run: echo "Deploying the ${{ inputs.artifact_tag }} application to ${{ inputs.environment }}"
        
        
 
